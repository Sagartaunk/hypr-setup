
################################
# MONITORS
################################
source = ~/.config/hypr/monitors.conf
monitor=,preferred,auto,1

################################
# VARIABLES
################################

$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun

################################
# AUTOSTART
################################
exec-once = gnome-keyring-daemon --start --components=secrets,ssh
exec-once = waybar
exec-once = swww-daemon
exec-once = sleep 1 && swww img /home/sagar/Pictures/Wallpapers/wallpaper.jpg
exec-once = nm-applet
exec-once = blueman-applet
exec-once = swaync
exec-once = /usr/lib/kdeconnectd
exec-once = kdeconnect-indicator
exec-once = hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

################################
# INPUT
################################

input {
kb_layout = us
follow_mouse = 1

touchpad {
natural_scroll = yes
}
}

################################
# GENERAL
################################

general {
gaps_in = 8
gaps_out = 12
border_size = 2

col.active_border = rgba(cba6f7ff)
col.inactive_border = rgba(6c708688)

resize_on_border = true
}

################################
# DECORATION
################################

decoration {

rounding = 16

blur {
enabled = yes
size = 8
passes = 3
vibrancy = 0.2
}

active_opacity = 0.95
inactive_opacity = 0.85
}

################################
# ANIMATIONS
################################

animations {

enabled = yes

bezier = smooth,0.25,0.1,0.25,1

animation = windows,1,6,smooth
animation = fade,1,5,smooth
animation = workspaces,1,6,smooth
}

################################
# LAYOUT
################################

dwindle {
pseudotile = yes
preserve_split = yes
}

################################
# KEYBINDS
################################

$mainMod = SUPER

bind = CTRL ALT, T, exec, $terminal
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod SHIFT, Q, killactive
bind = $mainMod, F, fullscreen

bind = $mainMod SHIFT, SPACE, togglefloating


bind = , Print, exec, grimblast save area - | satty --filename -
bind = $mainMod, Print, exec, grimblast save screen - | satty --filename -
bind = $mainMod SHIFT, Print, exec, grimblast save active - | satty --filename -
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = CTRL, Q, killactive
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bind = $mainMod, L, exec, hyprlock


################################
# WORKSPACES
################################

bind = $mainMod,1,workspace,1
bind = $mainMod,2,workspace,2
bind = $mainMod,3,workspace,3
bind = $mainMod,4,workspace,4
bind = $mainMod,5,workspace,5

################################
# LAYER RULES
################################

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0.2, match:namespace waybar


################################
# WINDOW RULES
################################
windowrule = immediate on, match:class ^(steam_app_\d+)$
windowrule = fullscreen on, match:class ^(steam_app_\d+)$
